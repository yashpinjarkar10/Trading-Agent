name: Scrape Wikipedia Current Events

on:
  schedule:
    # Every 4 hours. Wikipedia updates continuously but we only need
    # the last 2 days of entries. 4-hour cadence keeps LLM calls low
    # while still catching new events promptly.
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scrape-wikipedia
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install backend deps (cached)
        working-directory: backend
        run: uv sync --frozen

      - name: Verify required secrets are present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY missing"
            exit 1
          fi
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY missing (required for Wikipedia LLM parsing)"
            exit 1
          fi
          echo "Secrets present."

      - name: Run Wikipedia scraper
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          uv run python -m scraper.scripts.run_wikipedia

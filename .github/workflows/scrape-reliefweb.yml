name: Scrape ReliefWeb Disasters

on:
  schedule:
    # Every 20 minutes. ReliefWeb is human-curated (not real-time satellite)
    # so new entries appear a few per day, not per-minute. 20-min polling
    # is conservative; the 2-day lookback window guarantees no missed events.
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scrape-reliefweb
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install backend deps (cached)
        working-directory: backend
        run: uv sync --frozen

      - name: Verify required secrets are present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY missing"
            exit 1
          fi
          echo "Secrets present."

      - name: Run ReliefWeb scraper
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          uv run python -m scraper.scripts.run_reliefweb
